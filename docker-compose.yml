version: "3.9"

services:
  rootrevolution-api:
    image: rootrevolutionapi:latest
    container_name: rootrevolution-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3351:3000"
    environment:
      PORT: "3000"
      CASSANDRA_HOSTS: safer.easipath.com
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME:-}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD:-}
      CASSANDRA_USE_SSL: ${CASSANDRA_USE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-rootrevolution-secret-key-change-in-production}
      BASE_URL: ${BASE_URL:-https://cloudcalls.easipath.com}
      OWNER_EMAIL: ${OWNER_EMAIL:-biacibenga@gmail.com}
    volumes:
      - ./mockup:/app/mockup:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/backend_rootrevolution/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
